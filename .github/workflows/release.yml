name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  check-version-bump:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
      new-version: ${{ steps.check.outputs.new-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version was bumped
        id: check
        env:
          IS_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          CURRENT_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"

          if [[ "$IS_DISPATCH" == "true" ]]; then
            echo "Manual dispatch — releasing $CURRENT_VERSION"
            echo "should-release=true" >> $GITHUB_OUTPUT
            echo "new-version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi

          git checkout HEAD~1 -- pyproject.toml 2>/dev/null || true
          PREVIOUS_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/' 2>/dev/null || echo "0.0.0")
          git checkout HEAD -- pyproject.toml
          echo "Previous version: $PREVIOUS_VERSION"

          if [[ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]]; then
            echo "Version bump detected: $PREVIOUS_VERSION -> $CURRENT_VERSION"
            echo "should-release=true" >> $GITHUB_OUTPUT
            echo "new-version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "No version change detected"
            echo "should-release=false" >> $GITHUB_OUTPUT
          fi

  release:
    needs: check-version-bump
    if: needs.check-version-bump.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - name: Build package
        run: uv build

      - name: Build MCP Bundle
        run: npx @anthropic-ai/mcpb pack

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version-bump.outputs.new-version }}
        run: |
          if [ -f RELEASE_NOTES_TEMPLATE.md ]; then
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file RELEASE_NOTES_TEMPLATE.md \
              dist/* *.mcpb
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes \
              dist/* *.mcpb
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
